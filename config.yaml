dynamic: "additive"
factors:
  - 4.0
  - 2.0
  - 1.0
  - 0.5
  - 0.25
#Gamble simulation parameters
gamble_simulation:
  n: 252 #Can be any number, but if mirror_gambles is True and random_draw is off, n=252 will give the full set of valid gambles.
  fractals: [-407.0, -305.5, -241.5, -49.0, 50.0, 108.5, 210.5, 309.5, 440.5]
  # factals: [0.427, 0.583, 0.649, 0.841, 1.006, 1.184, 1.446, 1.739, 2.164]
  exclude_nobrainer: true #determines whether to exclude gambles where one option is strictly better than the other on all dimensions (i.e., "nobrainer" gambles)
  mirror_gambles: true #determines whether to include both (A, B) and (B, A) for each pair of gambles. If true, n should be set to the total number of valid gambles to get the full set of gambles.
  dynamic: additive #or multiplicative
  random_draw: true #detemines whether to randomly draw n gambles from the valid set (if true) or just take the first n gambles (if false). If mirror_gambles is true and random_draw is false, n should be set to the total number of valid gambles to get the full set of gambles.
  random_seed: 42 #random seed for reproducibility when random_draw is true